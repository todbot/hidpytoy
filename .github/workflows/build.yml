name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sign:
        description: 'Codesign and notarize builds'
        type: boolean
        default: false

jobs:

  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate UI
        run: pyside6-uic src/hidpytoy/HIDToyWindow.ui -o src/hidpytoy/HIDToyWindow.py

      - name: Build
        run: briefcase build macOS

      - name: Import signing certificate and store notarytool credentials
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.sign)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12
          xcrun notarytool store-credentials "briefcase-macOS-$APPLE_TEAM_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Package (signed + notarized DMG)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.sign)
        run: |
          SIGNING_ID=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with: $SIGNING_ID"
          briefcase package macOS --identity "$SIGNING_ID"

      - name: Package (unsigned DMG)
        if: github.event_name != 'release' && !(github.event_name == 'workflow_dispatch' && inputs.sign)
        run: briefcase package macOS --adhoc-sign

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HIDPyToy-mac
          path: build/hidpytoy/macos/*.dmg

  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate UI
        run: pyside6-uic src/hidpytoy/HIDToyWindow.ui -o src/hidpytoy/HIDToyWindow.py

      - name: Build
        run: briefcase build windows

      - name: Sign (Azure Trusted Signing)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.sign)
        uses: azure/trusted-signing-action@v0.4.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://wus2.codesigning.azure.net/
          trusted-signing-account-name: thingm-signing
          certificate-profile-name: ThingMProfile
          files-folder: build/hidpytoy/windows/app
          files-folder-filter: exe
          files-folder-recurse: false

      - name: Package (MSI)
        run: briefcase package windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HIDPyToy-windows
          path: build/hidpytoy/windows/*.msi

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get install -y libhidapi-hidraw0 libhidapi-libusb0

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate UI
        run: pyside6-uic src/hidpytoy/HIDToyWindow.ui -o src/hidpytoy/HIDToyWindow.py

      - name: Build
        run: briefcase build linux

      - name: Package
        run: briefcase package linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HIDPyToy-linux
          path: build/hidpytoy/linux/*.AppImage
